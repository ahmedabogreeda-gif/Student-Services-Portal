<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | منصة أكاديمية</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="logo-icon">🎓</span>
                <h1>تسجيل الدخول</h1>
                <p>أهلاً بك مجدداً! سجل دخولك للمتابعة</p>
            </div>
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">📧 البريد الإلكتروني</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">🔒 كلمة المرور</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="********" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">👁️</button>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me"><input type="checkbox" name="remember"><span>تذكرني</span></label>
                    <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
                </div>
                <button type="submit" class="btn-submit">تسجيل الدخول</button>
            </form>
            <div class="auth-footer">
                <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
                <a href="index.html" class="back-link">← العودة للرئيسية</a>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
