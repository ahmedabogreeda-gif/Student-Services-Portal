<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | منصة أكاديمية</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="logo-icon">🎓</span>
                <h1>إنشاء حساب جديد</h1>
                <p>انضم إلينا وابدأ رحلتك الأكاديمية</p>
            </div>
            <form class="auth-form" id="registerForm">
                <div class="form-row">
                    <div class="form-group"><label>الاسم الأول</label><input type="text" id="firstName" placeholder="أحمد" required></div>
                    <div class="form-group"><label>الاسم الأخير</label><input type="text" id="lastName" placeholder="محمد" required></div>
                </div>
                <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="email" placeholder="example@email.com" required></div>
                <div class="form-group"><label>رقم الجوال</label><input type="tel" id="phone" placeholder="05XXXXXXXX" required></div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="********" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">👁️</button>
                    </div>
                </div>
                <div class="form-group"><label>تأكيد كلمة المرور</label><input type="password" id="confirmPassword" placeholder="********" required></div>
                <div class="form-options"><label class="terms"><input type="checkbox" required><span>أوافق على <a href="#">شروط الاستخدام</a></span></label></div>
                <button type="submit" class="btn-submit">إنشاء الحساب</button>
            </form>
            <div class="auth-footer">
                <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
                <a href="index.html" class="back-link">← العودة للرئيسية</a>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
